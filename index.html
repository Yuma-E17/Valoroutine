<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VALO CLIMB | Tactical Tracker</title>
    
    <!-- PWA Metadata for iOS -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="ValoClimb">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & Libraries -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore-compat.js"></script>
    
    <!-- Lucide CDN -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0a0b10; -webkit-tap-highlight-color: transparent; color: #f1f5f9; overflow-x: hidden; }
        .italic-force { font-style: italic; }
        .progress-glow { box-shadow: 0 0 20px rgba(220, 38, 38, 0.4); }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .task-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        select { background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%236b7280' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e"); background-position: right 0.5rem center; background-repeat: no-repeat; background-size: 1.5em 1.5em; padding-right: 2.5rem; -webkit-appearance: none; -moz-appearance: none; appearance: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const APP_VERSION = "1.3.0-stable";

        // --- Firebase Configuration & Initialization ---
        const firebaseConfig = JSON.parse(__firebase_config);
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'valo-climb-default';

        const LucideIcon = ({ name, className = "w-5 h-5" }) => {
            const containerRef = useRef(null);
            useEffect(() => {
                if (containerRef.current && window.lucide) {
                    containerRef.current.innerHTML = `<i data-lucide="${name}" class="${className}"></i>`;
                    window.lucide.createIcons({ attrs: { class: className }, nameAttr: 'data-lucide' });
                }
            }, [name, className]);
            return <span ref={containerRef} className="inline-block" />;
        };

        const INITIAL_ROUTINE = [
            { id: 1, time: '10:30 AM', task: 'Wake Up', completed: false, purpose: 'Reset circadian rhythm.', subtasks: [{ label: 'Drink water', done: false }, { label: 'Sunlight', done: false }] },
            { id: 2, time: '10:45 AM', task: 'Morning Activation', completed: false, purpose: 'Reaction readiness.', subtasks: [{ label: '15 pushups', done: false }, { label: 'Wrist mobility', done: false }] },
            { id: 3, time: '11:00 AM', task: 'Breakfast', completed: false, purpose: 'Avoid heavy carbs.', subtasks: [{ label: 'Protein focused', done: false }] },
            { id: 5, time: '12:30 PM', task: 'Mechanical Training', completed: false, purpose: 'Warm brain + hand coordination.', subtasks: [{ label: '15 min Flicking', done: false }, { label: '15 min Tracking', done: false }] },
            { id: 6, time: '1:30 PM', task: 'Ranked Block 1', completed: false, purpose: '3 matches max. Stop if 2 Ls.' },
            { id: 7, time: '3:30 PM', task: 'Hard Reset Break', completed: false, purpose: 'Extremely important for winrate.' },
            { id: 8, time: '4:30 PM', task: 'Ranked Block 2', completed: false, purpose: 'Focus on Positioning.' },
            { id: 9, time: '6:00 PM', task: 'Running / Cardio', completed: false, purpose: 'Stamina + Stress reduction.' },
            { id: 11, time: '8:30 PM', task: 'Ranked Block 3', completed: false, purpose: '1–2 matches max.' },
            { id: 15, time: '12:30 AM', task: 'Sleep Attempt', completed: false, purpose: 'Rest for tomorrow.' }
        ];

        const App = () => {
            const [user, setUser] = useState(null);
            const [activeTab, setActiveTab] = useState('daily');
            const [routine, setRoutine] = useState(INITIAL_ROUTINE);
            const [history, setHistory] = useState([]);
            const [sessionData, setSessionData] = useState({
                rank: 'Silver 2', sleep: 'Good (7h+ Rested)', wins: 0, losses: 0, currentRR: 22, rrDiff: 0
            });
            const [loading, setLoading] = useState(true);
            const [isRefreshing, setIsRefreshing] = useState(false);

            // 1. Authenticate
            useEffect(() => {
                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await auth.signInWithCustomToken(__initial_auth_token);
                        } else {
                            await auth.signInAnonymously();
                        }
                    } catch (err) {
                        console.error("Auth error", err);
                    }
                };
                initAuth();
                return auth.onAuthStateChanged(u => {
                    setUser(u);
                    if (u) setLoading(false);
                });
            }, []);

            // 2. Sync Firestore Data
            useEffect(() => {
                if (!user) return;

                const routineRef = db.doc(`artifacts/${appId}/users/${user.uid}/state/routine`);
                const historyRef = db.collection(`artifacts/${appId}/users/${user.uid}/history`);
                const sessionRef = db.doc(`artifacts/${appId}/users/${user.uid}/state/session`);

                // Listen to Routine
                const unsubRoutine = routineRef.onSnapshot(doc => {
                    if (doc.exists) setRoutine(doc.data().tasks);
                    else routineRef.set({ tasks: INITIAL_ROUTINE });
                }, err => console.error(err));

                // Listen to Session Stats
                const unsubSession = sessionRef.onSnapshot(doc => {
                    if (doc.exists) setSessionData(doc.data());
                }, err => console.error(err));

                // Listen to History
                const unsubHistory = historyRef.onSnapshot(snapshot => {
                    const logs = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
                    setHistory(logs.sort((a, b) => b.timestamp_ms - a.timestamp_ms));
                }, err => console.error(err));

                return () => { unsubRoutine(); unsubSession(); unsubHistory(); };
            }, [user]);

            const forceRefreshHistory = async () => {
                if (!user || isRefreshing) return;
                setIsRefreshing(true);
                try {
                    const historyRef = db.collection(`artifacts/${appId}/users/${user.uid}/history`);
                    const snapshot = await historyRef.get();
                    const logs = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
                    setHistory(logs.sort((a, b) => b.timestamp_ms - a.timestamp_ms));
                } catch (error) {
                    console.error("Refresh failed:", error);
                } finally {
                    setTimeout(() => setIsRefreshing(false), 800);
                }
            };

            const updateCloudRoutine = (newRoutine) => {
                if (!user) return;
                db.doc(`artifacts/${appId}/users/${user.uid}/state/routine`).set({ tasks: newRoutine });
            };

            const updateCloudSession = (newData) => {
                if (!user) return;
                db.doc(`artifacts/${appId}/users/${user.uid}/state/session`).set(newData);
            };

            const toggleTask = (id) => {
                const newRoutine = routine.map(t => {
                    if (t.id === id) {
                        const newStatus = !t.completed;
                        return { 
                            ...t, 
                            completed: newStatus,
                            subtasks: t.subtasks ? t.subtasks.map(s => ({ ...s, done: newStatus })) : undefined
                        };
                    }
                    return t;
                });
                setRoutine(newRoutine);
                updateCloudRoutine(newRoutine);
            };

            const toggleSubtask = (taskId, subIdx) => {
                const newRoutine = routine.map(t => {
                    if (t.id === taskId) {
                        const newSubtasks = [...t.subtasks];
                        newSubtasks[subIdx].done = !newSubtasks[subIdx].done;
                        return { ...t, subtasks: newSubtasks, completed: newSubtasks.every(s => s.done) };
                    }
                    return t;
                });
                setRoutine(newRoutine);
                updateCloudRoutine(newRoutine);
            };

            const submitSession = async () => {
                if (!user) return;
                const missed = routine.filter(t => !t.completed).map(t => ({ time: t.time, task: t.task }));
                const record = {
                    date: new Date().toLocaleDateString(),
                    timestamp_ms: Date.now(),
                    stats: { ...sessionData },
                    missedTasks: missed
                };
                
                await db.collection(`artifacts/${appId}/users/${user.uid}/history`).add(record);
                
                // Reset Cloud State
                updateCloudRoutine(INITIAL_ROUTINE);
                updateCloudSession({ ...sessionData, wins: 0, losses: 0, rrDiff: 0 });
                setActiveTab('history');
            };

            const progressPercent = Math.round((routine.filter(t => t.completed).length / routine.length) * 100);

            if (loading) return (
                <div className="min-h-screen flex items-center justify-center bg-[#0a0b10]">
                    <div className="text-red-600 font-black animate-pulse uppercase tracking-[0.3em]">Syncing Cloud...</div>
                </div>
            );

            return (
                <div className="min-h-screen p-4 md:p-8 bg-[#0a0b10]">
                    <div className="max-w-3xl mx-auto pb-40">
                        <div className="flex justify-between items-start mb-8 pt-4">
                            <div>
                                <h1 className="text-4xl font-[900] text-red-600 tracking-tighter italic-force leading-none">VALO CLIMB</h1>
                                <div className="mt-1 flex flex-col">
                                    <p className="text-slate-500 text-[9px] font-black tracking-[0.3em] uppercase">Tactical Performance Cloud</p>
                                    <div className="flex items-center gap-2 mt-0.5">
                                        <span className="text-red-500 text-[8px] font-bold px-1.5 py-0.5 bg-red-950/30 rounded border border-red-900/50 uppercase tracking-tighter">v{APP_VERSION}</span>
                                        <span className="text-slate-600 text-[8px] uppercase font-black">ID: {user?.uid.slice(0,8)}</span>
                                    </div>
                                </div>
                            </div>
                            <div className="flex gap-2 bg-slate-900/50 p-1.5 rounded-2xl border border-slate-800">
                                <button onClick={() => setActiveTab('daily')} className={`p-3 rounded-xl transition-all ${activeTab === 'daily' ? 'bg-red-600 text-white shadow-lg' : 'text-slate-500'}`}>
                                    <LucideIcon name="check-square" />
                                </button>
                                <button onClick={() => setActiveTab('history')} className={`p-3 rounded-xl transition-all ${activeTab === 'history' ? 'bg-red-600 text-white shadow-lg' : 'text-slate-500'}`}>
                                    <LucideIcon name="history" />
                                </button>
                            </div>
                        </div>

                        {activeTab === 'daily' ? (
                            <div className="space-y-6 animate-in slide-in-from-bottom-4 duration-500">
                                <div className="bg-gradient-to-br from-slate-900 to-slate-950 border border-slate-800 p-7 rounded-[2.5rem] relative overflow-hidden shadow-2xl">
                                    <div className="flex justify-between items-end mb-4">
                                        <div className="space-y-1">
                                            <span className="text-[10px] font-black text-slate-500 uppercase tracking-widest">Efficiency Gauge</span>
                                            <div className="text-sm font-bold text-slate-300">Squad Progress</div>
                                        </div>
                                        <span className="text-4xl font-black text-red-600 italic-force leading-none">{progressPercent}%</span>
                                    </div>
                                    <div className="h-5 w-full bg-black/40 rounded-full overflow-hidden p-1 border border-white/5">
                                        <div className="h-full bg-red-600 rounded-full transition-all duration-700 progress-glow" style={{ width: `${progressPercent}%` }} />
                                    </div>
                                </div>

                                <div className="space-y-4">
                                    {routine.map(item => (
                                        <div key={item.id} className={`task-card flex flex-col p-6 rounded-[2rem] border transition-all ${item.completed ? 'bg-slate-950/40 border-slate-900 opacity-40' : 'bg-slate-900 border-slate-800 shadow-xl'}`}>
                                            <div className="flex items-center">
                                                <div className={`mr-5 cursor-pointer transform active:scale-90 transition-transform ${item.completed ? 'text-emerald-500' : 'text-slate-700'}`} onClick={() => toggleTask(item.id)}>
                                                    {item.completed ? <LucideIcon name="check-circle" className="w-9 h-9" /> : <div className="w-9 h-9 border-2 border-current rounded-2xl rotate-45" />}
                                                </div>
                                                <div className="flex-1">
                                                    <span className="text-[9px] font-black text-slate-500 uppercase tracking-widest">{item.time}</span>
                                                    <h3 className={`font-black text-xl uppercase tracking-tight ${item.completed ? 'line-through text-slate-600' : 'text-white'}`}>{item.task}</h3>
                                                </div>
                                            </div>
                                            {!item.completed && item.subtasks && (
                                                <div className="mt-4 ml-14 space-y-2.5">
                                                    {item.subtasks.map((sub, idx) => (
                                                        <div key={idx} onClick={() => toggleSubtask(item.id, idx)} className="flex items-center gap-3 cursor-pointer group">
                                                            <div className={`w-4 h-4 rounded-md border flex items-center justify-center transition-all ${sub.done ? 'bg-emerald-500 border-emerald-500' : 'border-slate-700 group-hover:border-red-500'}`}>
                                                                {sub.done && <LucideIcon name="check" className="w-3 h-3 text-white" />}
                                                            </div>
                                                            <span className={`text-[11px] font-black uppercase tracking-wider ${sub.done ? 'text-slate-600 line-through' : 'text-slate-400 group-hover:text-white'}`}>{sub.label}</span>
                                                        </div>
                                                    ))}
                                                </div>
                                            )}
                                        </div>
                                    ))}
                                </div>

                                <div className="mt-12 bg-slate-900 border-2 border-slate-800 rounded-[3rem] p-8 shadow-2xl">
                                    <h3 className="text-xl font-black uppercase tracking-tighter italic-force mb-8">Daily Session Report</h3>
                                    <div className="grid grid-cols-2 gap-8 mb-8">
                                        <div className="text-center">
                                            <label className="text-[10px] font-black text-emerald-500 uppercase block mb-1">Wins</label>
                                            <input type="number" value={sessionData.wins} onChange={e => updateCloudSession({...sessionData, wins: parseInt(e.target.value)||0})} className="w-full bg-transparent text-center font-black text-5xl text-emerald-400 outline-none italic-force" />
                                        </div>
                                        <div className="text-center">
                                            <label className="text-[10px] font-black text-red-500 uppercase block mb-1">Losses</label>
                                            <input type="number" value={sessionData.losses} onChange={e => updateCloudSession({...sessionData, losses: parseInt(e.target.value)||0})} className="w-full bg-transparent text-center font-black text-5xl text-red-400 outline-none italic-force" />
                                        </div>
                                    </div>
                                    <button onClick={submitSession} className="w-full py-4 bg-red-600 hover:bg-red-500 text-white font-[900] uppercase italic-force tracking-widest rounded-2xl shadow-xl shadow-red-600/20 transition-all active:scale-[0.98]">
                                        SUBMIT CLOUD LOG
                                    </button>
                                </div>
                            </div>
                        ) : (
                            <div className="space-y-6 animate-in fade-in duration-500">
                                <div className="flex justify-between items-center px-2">
                                    <h2 className="text-2xl font-black text-white italic-force uppercase tracking-tighter">Global History</h2>
                                    <button 
                                        onClick={forceRefreshHistory}
                                        className={`p-2 rounded-full bg-slate-900 border border-slate-800 text-slate-400 hover:text-white transition-all ${isRefreshing ? 'animate-spin' : 'active:scale-90'}`}
                                    >
                                        <LucideIcon name="refresh-cw" className="w-4 h-4" />
                                    </button>
                                </div>
                                
                                {history.length === 0 ? (
                                    <div className="py-20 text-center text-slate-700 uppercase font-black tracking-widest text-[10px]">No Battle Logs Found</div>
                                ) : (
                                    history.map(record => (
                                        <div key={record.id} className="bg-slate-900 border border-slate-800 rounded-[2.5rem] p-6 shadow-xl">
                                            <div className="flex justify-between items-center mb-4">
                                                <span className="text-sm font-black text-white italic-force">{record.date}</span>
                                                <div className="flex items-center gap-2">
                                                    <span className={`text-xs font-black uppercase px-2 py-0.5 rounded ${record.stats.wins >= record.stats.losses ? 'bg-emerald-950/40 text-emerald-400' : 'bg-red-950/40 text-red-400'}`}>
                                                        {record.stats.wins}W - {record.stats.losses}L
                                                    </span>
                                                </div>
                                            </div>
                                            {record.missedTasks?.length > 0 && (
                                                <div className="mt-4 pt-4 border-t border-slate-800/50">
                                                    <span className="text-[9px] font-black text-slate-600 uppercase tracking-widest block mb-2">Gaps in Discipline:</span>
                                                    <div className="flex flex-wrap gap-1.5">
                                                        {record.missedTasks.map((m, i) => (
                                                            <span key={i} className="text-[8px] font-bold text-slate-400 bg-slate-800/40 px-2 py-0.5 rounded-full uppercase italic-force">
                                                                {m.task}
                                                            </span>
                                                        ))}
                                                    </div>
                                                </div>
                                            )}
                                        </div>
                                    ))
                                )}
                            </div>
                        )}

                        <div className="fixed bottom-8 left-1/2 -translate-x-1/2 w-[calc(100%-3rem)] max-w-sm z-40">
                             <div className="bg-slate-900/80 backdrop-blur-xl border border-white/5 p-2 rounded-[2.5rem] shadow-2xl flex justify-around">
                                <button onClick={() => setActiveTab('daily')} className={`flex-1 py-4 flex flex-col items-center gap-1 transition-all ${activeTab === 'daily' ? 'text-white' : 'text-slate-500'}`}>
                                    <LucideIcon name="list" className="w-5 h-5" />
                                    <span className="text-[8px] font-black uppercase tracking-widest">Routine</span>
                                </button>
                                <button onClick={() => setActiveTab('history')} className={`flex-1 py-4 flex flex-col items-center gap-1 transition-all ${activeTab === 'history' ? 'text-white' : 'text-slate-500'}`}>
                                    <LucideIcon name="history" className="w-5 h-5" />
                                    <span className="text-[8px] font-black uppercase tracking-widest">History</span>
                                </button>
                             </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
