<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VALO CLIMB | Tactical Tracker</title>
    
    <!-- PWA Metadata for iOS -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="ValoClimb">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & Libraries -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide CDN -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0a0b10; -webkit-tap-highlight-color: transparent; color: #f1f5f9; overflow-x: hidden; }
        .italic-force { font-style: italic; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .progress-glow { box-shadow: 0 0 20px rgba(220, 38, 38, 0.4); }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .task-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        select { background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%236b7280' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e"); background-position: right 0.5rem center; background-repeat: no-repeat; background-size: 1.5em 1.5em; padding-right: 2.5rem; -webkit-appearance: none; -moz-appearance: none; appearance: none; }
        .input-glow:focus { border-color: #dc2626; box-shadow: 0 0 10px rgba(220, 38, 38, 0.2); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        
        // Firebase Config Handling
        const firebaseConfig = JSON.parse(typeof __firebase_config !== 'undefined' ? __firebase_config : '{}');
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'valo-climb-v1';
        
        if (firebaseConfig.apiKey) {
            if (!firebase.apps.length) {
                firebase.initializeApp(firebaseConfig);
            }
        }

        const LucideIcon = ({ name, className = "w-5 h-5" }) => {
            const containerRef = useRef(null);
            useEffect(() => {
                if (containerRef.current && window.lucide) {
                    containerRef.current.innerHTML = `<i data-lucide="${name}" class="${className}"></i>`;
                    window.lucide.createIcons({ attrs: { class: className }, nameAttr: 'data-lucide' });
                }
            }, [name, className]);
            return <span ref={containerRef} className="inline-block" />;
        };

        const INITIAL_ROUTINE = [
            { 
                id: 1, time: '10:30 AM', duration: '15m', task: 'Wake Up', completed: false, completedAt: null,
                purpose: 'Reset circadian rhythm.',
                subtasks: [
                    { label: 'Drink water', done: false },
                    { label: 'Open blinds / sunlight', done: false },
                    { label: 'Brush teeth', done: false }
                ]
            },
            { 
                id: 2, time: '10:45 AM', duration: '15m', task: 'Morning Activation', completed: false, completedAt: null,
                purpose: 'Improves mouse control + reaction readiness.',
                subtasks: [
                    { label: '15 pushups', done: false },
                    { label: '20 squats', done: false },
                    { label: 'Wrist + forearm mobility', done: false },
                    { label: 'Shoulder rotations', done: false }
                ]
            },
            { 
                id: 3, time: '11:00 AM', duration: '30m', task: 'Breakfast', completed: false, completedAt: null,
                purpose: 'Avoid heavy carbs.',
                subtasks: [
                    { label: 'Eggs', done: false },
                    { label: 'Yogurt', done: false },
                    { label: 'Protein shake', done: false },
                    { label: 'Fruit', done: false }
                ]
            },
            { id: 4, time: '11:30 AM', duration: '1h', task: 'Life Tasks / School Work', completed: false, completedAt: null, purpose: '2 Pomodoro cycles if possible.' },
            { 
                id: 5, time: '12:30 PM', duration: '45m', task: 'Mechanical Training', completed: false, completedAt: null,
                purpose: 'Warm brain + hand coordination.',
                subtasks: [
                    { label: '15 min Flick training', done: false },
                    { label: '15 min Tracking training', done: false },
                    { label: '15 min Precision micro-adjustment', done: false }
                ]
            },
            { 
                id: 5.5, time: '1:15 PM', duration: '15m', task: 'Final Warmup Window', completed: false, completedAt: null,
                purpose: 'Transition from trainer to in-game feel.',
                subtasks: [
                    { label: '5 min Easy bots', done: false },
                    { label: '1 Deathmatch (Movement focus)', done: false }
                ]
            },
            { id: 6, time: '1:30 PM', duration: '2h', task: 'Ranked Block 1', completed: false, completedAt: null, purpose: '3 matches max. Stop if 2 Ls.' },
            { id: 7, time: '3:30 PM', duration: '1h', task: 'Hard Reset Break', completed: false, completedAt: null, purpose: 'Extremely important for winrate consistency.' },
            { id: 8, time: '4:30 PM', duration: '1.5h', task: 'Ranked Block 2', completed: false, completedAt: null, purpose: 'Focus on Positioning & Comms.' },
            { id: 9, time: '6:00 PM', duration: '1h', task: 'Running / Cardio', completed: false, completedAt: null, purpose: 'Stamina + Stress reduction.' },
            { id: 10, time: '7:00 PM', duration: '1.5h', task: 'Recreation Block', completed: false, completedAt: null, purpose: 'Prevents burnout.' },
            { id: 11, time: '8:30 PM', duration: '1.5h', task: 'Ranked Block 3', completed: false, completedAt: null, purpose: '1–2 matches max.' },
            { id: 12, time: '10:00 PM', duration: '30m', task: 'Mechanical Lock-in', completed: false, completedAt: null, purpose: 'Lock muscle memory.' },
            { id: 13, time: '10:30 PM', duration: '1h', task: 'Dental + Health Routine', completed: false, completedAt: null, purpose: 'Relaxation phase.' },
            { id: 14, time: '11:30 PM', duration: '1h', task: 'Sleep Preparation', completed: false, completedAt: null, purpose: 'Reduce screen brightness.' },
            { id: 15, time: '12:30 AM', duration: 'N/A', task: 'Sleep Attempt', completed: false, completedAt: null, purpose: 'Leave bed if insomnia lasts 20m.' }
        ];

        const App = () => {
            const [activeTab, setActiveTab] = useState('daily');
            const [user, setUser] = useState(null);
            const [history, setHistory] = useState([]);
            const [routine, setRoutine] = useState(INITIAL_ROUTINE);
            const [sessionData, setSessionData] = useState({
                rank: 'Silver 2',
                sleep: 'Good (7h+ Rested)',
                wins: 0,
                losses: 0,
                currentRR: 22,
                rrDiff: 0
            });

            // Authentication Setup
            useEffect(() => {
                if (!firebaseConfig.apiKey) return;
                const auth = firebase.auth();
                const initAuth = async () => {
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        await auth.signInWithCustomToken(__initial_auth_token);
                    } else {
                        await auth.signInAnonymously();
                    }
                };
                initAuth();
                return auth.onAuthStateChanged(setUser);
            }, []);

            // Firestore Data Listeners (Routine & Stats)
            useEffect(() => {
                if (!user || !firebaseConfig.apiKey) return;
                const db = firebase.firestore();
                const userDoc = db.collection('artifacts').doc(appId).collection('users').doc(user.uid);

                // Listen for Routine & Session Stats
                const unsubState = userDoc.onSnapshot((doc) => {
                    if (doc.exists) {
                        const data = doc.data();
                        if (data.routine) setRoutine(data.routine);
                        if (data.sessionData) setSessionData(data.sessionData);
                    }
                });

                // Listen for History
                const unsubHistory = userDoc.collection('history').onSnapshot((snapshot) => {
                    const logs = snapshot.docs.map(d => ({ ...d.data(), id: d.id }));
                    setHistory(logs.sort((a, b) => b.id - a.id));
                });

                return () => {
                    unsubState();
                    unsubHistory();
                };
            }, [user]);

            // Sync Helper Function
            const syncToCloud = async (newData, type) => {
                if (!user || !firebaseConfig.apiKey) return;
                const db = firebase.firestore();
                const userDoc = db.collection('artifacts').doc(appId).collection('users').doc(user.uid);
                
                try {
                    if (type === 'routine') await userDoc.set({ routine: newData }, { merge: true });
                    if (type === 'session') await userDoc.set({ sessionData: newData }, { merge: true });
                } catch (e) {
                    console.error("Cloud sync failed", e);
                }
            };

            const toggleTask = (id) => {
                const now = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                const updated = routine.map(t => {
                    if (t.id === id) {
                        const newStatus = !t.completed;
                        return { 
                            ...t, 
                            completed: newStatus,
                            completedAt: newStatus ? now : null,
                            subtasks: t.subtasks ? t.subtasks.map(s => ({ ...s, done: newStatus })) : undefined
                        };
                    }
                    return t;
                });
                setRoutine(updated);
                syncToCloud(updated, 'routine');
            };

            const toggleSubtask = (taskId, subIdx) => {
                const now = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                const updated = routine.map(t => {
                    if (t.id === taskId) {
                        const newSubtasks = t.subtasks.map((s, idx) => 
                            idx === subIdx ? { ...s, done: !s.done } : s
                        );
                        const allDone = newSubtasks.every(s => s.done);
                        return { 
                            ...t, 
                            subtasks: newSubtasks, 
                            completed: allDone,
                            completedAt: allDone ? now : (t.completed ? t.completedAt : null)
                        };
                    }
                    return t;
                });
                setRoutine(updated);
                syncToCloud(updated, 'routine');
            };

            const updateSession = (key, val) => {
                const updated = { ...sessionData, [key]: val };
                setSessionData(updated);
                syncToCloud(updated, 'session');
            };

            const submitSession = async () => {
                const missed = routine.filter(t => !t.completed).map(t => ({ time: t.time, task: t.task }));
                const recordId = Date.now();
                const newRecord = {
                    id: recordId,
                    date: new Date().toLocaleDateString(),
                    timestamp: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
                    stats: { ...sessionData },
                    missedTasks: missed
                };
                
                if (user && firebaseConfig.apiKey) {
                    const db = firebase.firestore();
                    const userDoc = db.collection('artifacts').doc(appId).collection('users').doc(user.uid);
                    
                    // 1. Add to history collection
                    await userDoc.collection('history').doc(String(recordId)).set(newRecord);
                    
                    // 2. Reset daily state in cloud
                    const resetStats = { ...sessionData, wins: 0, losses: 0, rrDiff: 0 };
                    await userDoc.set({ routine: INITIAL_ROUTINE, sessionData: resetStats }, { merge: true });
                }

                setActiveTab('history');
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            const clearHistory = async () => {
                if(confirm("Delete all historical logs?")) {
                    if (user && firebaseConfig.apiKey) {
                        const db = firebase.firestore();
                        const histRef = db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('history');
                        const snap = await histRef.get();
                        const batch = db.batch();
                        snap.docs.forEach(doc => batch.delete(doc.ref));
                        await batch.commit();
                    }
                }
            };

            const forceRefresh = () => window.location.reload();

            const progressPercent = Math.round((routine.filter(t => t.completed).length / routine.length) * 100);

            const ranks = [
                'Unranked', 'Iron 1', 'Iron 2', 'Iron 3', 'Bronze 1', 'Bronze 2', 'Bronze 3', 
                'Silver 1', 'Silver 2', 'Silver 3', 'Gold 1', 'Gold 2', 'Gold 3', 
                'Platinum 1', 'Platinum 2', 'Platinum 3', 'Diamond 1', 'Diamond 2', 'Diamond 3', 
                'Ascendant 1', 'Ascendant 2', 'Ascendant 3', 'Immortal 1', 'Immortal 2', 'Immortal 3', 'Radiant'
            ];

            return (
                <div className="min-h-screen p-4 md:p-8 bg-[#0a0b10]">
                    <div className="max-w-3xl mx-auto pb-40">
                        
                        <div className="flex justify-between items-start mb-8 pt-4">
                            <div>
                                <h1 className="text-4xl font-[900] text-red-600 tracking-tighter italic-force">VALO CLIMB</h1>
                                <div className="flex items-center gap-2">
                                    <p className="text-slate-500 text-[10px] font-black tracking-[0.3em] uppercase">Tactical Performance Cloud</p>
                                    <span className="text-[9px] px-1.5 py-0.5 rounded bg-slate-900 text-slate-600 font-bold border border-slate-800">v2.4.1</span>
                                </div>
                            </div>
                            
                            <div className="flex gap-2 bg-slate-900/50 p-1.5 rounded-2xl border border-slate-800">
                                <button onClick={() => setActiveTab('daily')} className={`p-3 rounded-xl transition-all ${activeTab === 'daily' ? 'bg-red-600 text-white shadow-lg' : 'text-slate-500'}`}>
                                    <LucideIcon name="check-square" />
                                </button>
                                <button onClick={() => setActiveTab('history')} className={`p-3 rounded-xl transition-all ${activeTab === 'history' ? 'bg-red-600 text-white shadow-lg' : 'text-slate-500'}`}>
                                    <LucideIcon name="history" />
                                </button>
                            </div>
                        </div>

                        {activeTab === 'daily' ? (
                            <div className="space-y-6">
                                <div className="bg-gradient-to-br from-slate-900 to-slate-950 border border-slate-800 p-7 rounded-[2.5rem] relative overflow-hidden shadow-2xl">
                                    <div className="flex justify-between items-end mb-4">
                                        <div className="space-y-1">
                                            <span className="text-[10px] font-black text-slate-500 uppercase tracking-widest">Efficiency</span>
                                            <div className="text-sm font-bold text-slate-300">Daily Progression</div>
                                        </div>
                                        <span className="text-4xl font-black text-red-600 italic-force leading-none">{progressPercent}%</span>
                                    </div>
                                    <div className="h-5 w-full bg-black/40 rounded-full overflow-hidden p-1 border border-white/5">
                                        <div className="h-full bg-red-600 rounded-full transition-all duration-700 progress-glow" style={{ width: `${progressPercent}%` }} />
                                    </div>
                                </div>

                                <div className="space-y-4">
                                    {routine.map(item => (
                                        <div key={item.id} className={`task-card flex flex-col p-6 rounded-[2rem] border transition-all ${item.completed ? 'bg-slate-950/40 border-slate-900 opacity-40' : 'bg-slate-900 border-slate-800 shadow-xl'}`}>
                                            <div className="flex items-center">
                                                <div className={`mr-5 cursor-pointer transform active:scale-90 transition-transform ${item.completed ? 'text-emerald-500' : 'text-slate-700'}`} onClick={() => toggleTask(item.id)}>
                                                    {item.completed ? <LucideIcon name="check-circle" className="w-9 h-9" /> : <div className="w-9 h-9 border-2 border-current rounded-2xl rotate-45" />}
                                                </div>
                                                <div className="flex-1">
                                                    <div className="flex justify-between items-start">
                                                        <div className="flex items-center gap-2">
                                                            <span className="text-[9px] font-black text-slate-500 uppercase tracking-widest">{item.time}</span>
                                                            <span className="text-[8px] font-bold text-slate-700 bg-slate-950 px-1.5 py-0.5 rounded uppercase">{item.duration}</span>
                                                        </div>
                                                        {item.completedAt && <span className="text-[8px] font-bold text-emerald-500 bg-emerald-500/10 px-2 py-0.5 rounded-full uppercase">Logged at {item.completedAt}</span>}
                                                    </div>
                                                    <h3 className={`font-black text-xl uppercase tracking-tight ${item.completed ? 'line-through text-slate-600' : 'text-white'}`}>{item.task}</h3>
                                                </div>
                                            </div>
                                            
                                            {!item.completed && (
                                                <div className="mt-4 ml-14 space-y-4">
                                                    {item.subtasks && (
                                                        <div className="space-y-2.5">
                                                            {item.subtasks.map((sub, idx) => (
                                                                <div key={idx} onClick={() => toggleSubtask(item.id, idx)} className="flex items-center gap-3 cursor-pointer group">
                                                                    <div className={`w-4 h-4 rounded-md border flex items-center justify-center transition-all ${sub.done ? 'bg-emerald-500 border-emerald-500' : 'border-slate-700 group-hover:border-red-500'}`}>
                                                                        {sub.done && <LucideIcon name="check" className="w-3 h-3 text-white" />}
                                                                    </div>
                                                                    <span className={`text-[11px] font-black uppercase tracking-wider ${sub.done ? 'text-slate-600 line-through' : 'text-slate-400 group-hover:text-white'}`}>{sub.label}</span>
                                                                </div>
                                                            ))}
                                                        </div>
                                                    )}
                                                    <div className="pt-2 border-t border-slate-800/50">
                                                        <p className="text-[10px] text-slate-500 font-bold italic">{item.purpose}</p>
                                                    </div>
                                                </div>
                                            )}
                                        </div>
                                    ))}
                                </div>

                                <div className="mt-12 bg-slate-900 border-2 border-slate-800 rounded-[3rem] p-8 shadow-2xl">
                                    <div className="flex items-center gap-3 mb-8">
                                        <div className="bg-red-600 p-2 rounded-xl">
                                            <LucideIcon name="bar-chart" className="text-white w-5 h-5" />
                                        </div>
                                        <h3 className="text-xl font-black uppercase tracking-tighter italic-force">Analytics</h3>
                                    </div>

                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                        <div className="space-y-4">
                                            <div className="space-y-2">
                                                <label className="text-[9px] font-black text-slate-500 uppercase tracking-widest ml-2">Rank</label>
                                                <select 
                                                    value={sessionData.rank}
                                                    onChange={(e) => updateSession('rank', e.target.value)}
                                                    className="w-full bg-slate-950 border border-slate-800 text-white rounded-2xl px-5 py-3.5 font-bold text-sm outline-none focus:border-red-600 transition-colors"
                                                >
                                                    {ranks.map(r => <option key={r} value={r}>{r}</option>)}
                                                </select>
                                            </div>
                                            <div className="space-y-2">
                                                <label className="text-[9px] font-black text-slate-500 uppercase tracking-widest ml-2">Sleep</label>
                                                <select 
                                                    value={sessionData.sleep}
                                                    onChange={(e) => updateSession('sleep', e.target.value)}
                                                    className="w-full bg-slate-950 border border-slate-800 text-white rounded-2xl px-5 py-3.5 font-bold text-sm outline-none focus:border-red-600 transition-colors"
                                                >
                                                    <option>Excellent (8h+ Deep)</option>
                                                    <option>Good (7h+ Rested)</option>
                                                    <option>Average (6h-7h)</option>
                                                    <option>Poor (Fragmented)</option>
                                                    <option>Insomnia / Tired</option>
                                                </select>
                                            </div>
                                        </div>

                                        <div className="flex justify-around items-center pt-4">
                                            <div className="text-center">
                                                <label className="text-[10px] font-black text-emerald-500 uppercase tracking-widest mb-1 block">Wins</label>
                                                <input 
                                                    type="number" 
                                                    value={sessionData.wins} 
                                                    onChange={(e) => updateSession('wins', parseInt(e.target.value) || 0)}
                                                    className="w-20 bg-transparent text-center font-black text-5xl text-emerald-400 outline-none italic-force border-b border-emerald-500/10 focus:border-emerald-500"
                                                />
                                            </div>
                                            <div className="h-12 w-px bg-slate-800"></div>
                                            <div className="text-center">
                                                <label className="text-[10px] font-black text-red-500 uppercase tracking-widest mb-1 block">Losses</label>
                                                <input 
                                                    type="number" 
                                                    value={sessionData.losses} 
                                                    onChange={(e) => updateSession('losses', parseInt(e.target.value) || 0)}
                                                    className="w-20 bg-transparent text-center font-black text-5xl text-red-400 outline-none italic-force border-b border-red-500/10 focus:border-red-500"
                                                />
                                            </div>
                                        </div>
                                    </div>

                                    <div className="mt-8 flex items-center gap-6 p-6 bg-slate-950/50 border border-slate-800/50 rounded-3xl">
                                        <div className="flex-1 space-y-2">
                                            <label className="text-[9px] font-black text-slate-500 uppercase tracking-widest">RR</label>
                                            <input 
                                                type="number" 
                                                value={sessionData.currentRR} 
                                                onChange={(e) => updateSession('currentRR', parseInt(e.target.value) || 0)}
                                                className="w-full bg-transparent border-b border-slate-800 text-white font-black text-2xl outline-none py-1 focus:border-red-600 transition-colors"
                                            />
                                        </div>
                                        <div className="flex-1 space-y-2">
                                            <label className="text-[9px] font-black text-slate-500 uppercase tracking-widest">Gain/Loss</label>
                                            <input 
                                                type="number" 
                                                value={sessionData.rrDiff} 
                                                onChange={(e) => updateSession('rrDiff', parseInt(e.target.value) || 0)}
                                                className={`w-full bg-transparent border-b border-slate-800 font-black text-2xl outline-none py-1 focus:border-red-600 transition-colors ${sessionData.rrDiff >= 0 ? 'text-emerald-500' : 'text-red-500'}`}
                                            />
                                        </div>
                                    </div>
                                    
                                    <button 
                                        onClick={submitSession}
                                        className="w-full mt-8 py-4 bg-red-600 hover:bg-red-500 text-white font-[900] uppercase italic-force tracking-widest rounded-2xl shadow-xl shadow-red-600/20 transition-all active:scale-[0.98]"
                                    >
                                        SUBMIT DAILY SESSION
                                    </button>
                                </div>
                            </div>
                        ) : (
                            <div className="space-y-8">
                                <div className="flex justify-between items-center">
                                    <h2 className="text-2xl font-black text-white italic-force uppercase tracking-tighter">Archive</h2>
                                    <div className="flex items-center gap-4">
                                        <button onClick={forceRefresh} className="flex items-center gap-1.5 text-[10px] font-black text-slate-500 uppercase tracking-widest hover:text-white transition-colors">
                                            <LucideIcon name="refresh-cw" className="w-3 h-3" />
                                            Force Refresh
                                        </button>
                                        {history.length > 0 && (
                                            <button onClick={clearHistory} className="text-[10px] font-black text-red-600 uppercase tracking-widest">Clear All</button>
                                        )}
                                    </div>
                                </div>
                                
                                {history.length === 0 ? (
                                    <div className="bg-slate-900 border border-slate-800 p-12 rounded-[3rem] text-center">
                                        <LucideIcon name="clipboard-list" className="w-12 h-12 text-slate-700 mx-auto mb-4" />
                                        <p className="text-slate-500 font-bold uppercase text-xs tracking-widest">No logs found</p>
                                    </div>
                                ) : (
                                    <div className="space-y-6">
                                        {history.map(record => (
                                            <div key={record.id} className="bg-slate-900 border border-slate-800 rounded-[2.5rem] overflow-hidden shadow-xl">
                                                <div className="bg-slate-950 p-6 flex justify-between items-center border-b border-slate-800">
                                                    <div>
                                                        <div className="text-[10px] font-black text-red-600 uppercase tracking-widest">Date</div>
                                                        <div className="text-sm font-black text-white">{record.date} @ {record.timestamp}</div>
                                                    </div>
                                                    <div className="text-right">
                                                        <div className="text-[10px] font-black text-slate-500 uppercase tracking-widest">Ending Rank</div>
                                                        <div className="text-sm font-black text-emerald-500 italic-force">{record.stats.rank} ({record.stats.currentRR}RR)</div>
                                                    </div>
                                                </div>
                                                <div className="p-6">
                                                    <div className="flex gap-4 mb-6">
                                                        <div className="flex-1 text-center border-r border-slate-800">
                                                            <div className="text-[8px] font-black text-slate-500 uppercase">Sleep</div>
                                                            <div className="text-[11px] font-bold text-slate-300">{record.stats.sleep}</div>
                                                        </div>
                                                        <div className="flex-1 text-center">
                                                            <div className="text-[8px] font-black text-slate-500 uppercase">Result</div>
                                                            <div className="text-[11px] font-bold text-slate-300 uppercase">
                                                                <span className="text-emerald-500">{record.stats.wins}W</span> - <span className="text-red-500">{record.stats.losses}L</span>
                                                            </div>
                                                        </div>
                                                    </div>
                                                    <div>
                                                        <h4 className="text-[9px] font-black text-slate-500 uppercase tracking-widest mb-3 flex items-center gap-2">
                                                            <LucideIcon name="alert-circle" className="w-3 h-3 text-red-600" />
                                                            Missed Objectives
                                                        </h4>
                                                        <div className="space-y-2">
                                                            {record.missedTasks.length > 0 ? record.missedTasks.map((t, idx) => (
                                                                <div key={idx} className="flex justify-between items-center bg-black/20 p-3 rounded-xl border border-white/5">
                                                                    <span className="text-[10px] font-black text-slate-400 uppercase tracking-tighter">{t.task}</span>
                                                                    <span className="text-[9px] font-bold text-slate-600 italic-force">{t.time}</span>
                                                                </div>
                                                            )) : (
                                                                <div className="text-[10px] font-black text-emerald-500/50 uppercase italic-force">100% Efficiency Session</div>
                                                            )}
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        )}

                        <div className="fixed bottom-8 left-1/2 -translate-x-1/2 w-[calc(100%-3rem)] max-w-sm z-40">
                             <div className="bg-slate-900/80 backdrop-blur-xl border border-white/5 p-2 rounded-[2.5rem] shadow-2xl flex justify-around">
                                <button onClick={() => setActiveTab('daily')} className={`flex-1 py-4 flex flex-col items-center gap-1 transition-all ${activeTab === 'daily' ? 'text-white' : 'text-slate-500'}`}>
                                    <LucideIcon name="list" className="w-5 h-5" />
                                    <span className="text-[8px] font-black uppercase tracking-widest">Routine</span>
                                </button>
                                <button onClick={() => setActiveTab('history')} className={`flex-1 py-4 flex flex-col items-center gap-1 transition-all ${activeTab === 'history' ? 'text-white' : 'text-slate-500'}`}>
                                    <LucideIcon name="history" className="w-5 h-5" />
                                    <span className="text-[8px] font-black uppercase tracking-widest">History</span>
                                </button>
                             </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
