<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VALO CLIMB | Tactical Tracker</title>
    
    <!-- PWA Metadata for iOS -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="ValoClimb">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & Libraries -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide CDN -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0a0b10; -webkit-tap-highlight-color: transparent; color: #f1f5f9; overflow-x: hidden; }
        .italic-force { font-style: italic; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .progress-glow { box-shadow: 0 0 20px rgba(220, 38, 38, 0.4); }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .task-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        select { background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%236b7280' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e"); background-position: right 0.5rem center; background-repeat: no-repeat; background-size: 1.5em 1.5em; padding-right: 2.5rem; -webkit-appearance: none; -moz-appearance: none; appearance: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        
        const firebaseConfig = JSON.parse(typeof __firebase_config !== 'undefined' ? __firebase_config : '{}');
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'valo-climb-v1';
        
        if (firebaseConfig.apiKey && !firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }

        const LucideIcon = ({ name, className = "w-5 h-5" }) => {
            const containerRef = useRef(null);
            useEffect(() => {
                if (containerRef.current && window.lucide) {
                    containerRef.current.innerHTML = `<i data-lucide="${name}" class="${className}"></i>`;
                    window.lucide.createIcons({ attrs: { class: className }, nameAttr: 'data-lucide' });
                }
            }, [name, className]);
            return <span ref={containerRef} className="inline-block" />;
        };

        const INITIAL_ROUTINE = [
            { id: 1, time: '10:30 AM', duration: '15m', task: 'Wake Up', completed: false, purpose: 'Reset circadian rhythm.', subtasks: [{ label: 'Drink water', done: false }, { label: 'Open blinds / sunlight', done: false }, { label: 'Brush teeth', done: false }] },
            { id: 2, time: '10:45 AM', duration: '15m', task: 'Morning Activation', completed: false, purpose: 'Improves mouse control + reaction readiness.', subtasks: [{ label: '15 pushups', done: false }, { label: '20 squats', done: false }, { label: 'Wrist mobility', done: false }] },
            { id: 3, time: '11:00 AM', duration: '30m', task: 'Breakfast', completed: false, purpose: 'Avoid heavy carbs.', subtasks: [{ label: 'High Protein', done: false }, { label: 'Hydrate', done: false }] },
            { id: 4, time: '11:30 AM', duration: '1h', task: 'Life Tasks', completed: false, purpose: 'Clear mental stack.' },
            { id: 5, time: '12:30 PM', duration: '45m', task: 'Mechanical Training', completed: false, purpose: 'Warm brain + hand coordination.' },
            { id: 6, time: '1:30 PM', duration: '2h', task: 'Ranked Block 1', completed: false, purpose: '3 matches max.' },
            { id: 7, time: '3:30 PM', duration: '1h', task: 'Hard Reset Break', completed: false, purpose: 'Refresh mental focus.' },
            { id: 8, time: '4:30 PM', duration: '1.5h', task: 'Ranked Block 2', completed: false, purpose: 'Focus on Positioning.' },
            { id: 9, time: '6:00 PM', duration: '1h', task: 'Exercise', completed: false, purpose: 'Stress reduction.' },
            { id: 10, time: '7:00 PM', duration: '1.5h', task: 'Recreation', completed: false, purpose: 'Prevents burnout.' },
            { id: 11, time: '8:30 PM', duration: '1.5h', task: 'Ranked Block 3', completed: false, purpose: 'Night session.' },
            { id: 12, time: '10:00 PM', duration: '30m', task: 'Mechanical Lock-in', completed: false, purpose: 'Muscle memory.' },
            { id: 13, time: '10:30 PM', duration: '1h', task: 'Winding Down', completed: false, purpose: 'Relaxation phase.' },
            { id: 14, time: '11:30 PM', duration: '1h', task: 'Sleep Preparation', completed: false, purpose: 'No blue light.' },
            { id: 15, time: '12:30 AM', duration: 'N/A', task: 'Sleep', completed: false, purpose: 'Consistent schedule.' }
        ];

        const App = () => {
            const [activeTab, setActiveTab] = useState('daily');
            const [user, setUser] = useState(null);
            const [history, setHistory] = useState([]);
            const [routine, setRoutine] = useState(INITIAL_ROUTINE);
            const [isSubmitting, setIsSubmitting] = useState(false);
            const [sessionData, setSessionData] = useState({
                rank: 'Silver 2',
                sleep: 'Good (7h+ Rested)',
                wins: 0,
                losses: 0,
                currentRR: 22,
                rrDiff: 0
            });

            useEffect(() => {
                if (!firebaseConfig.apiKey) return;
                const auth = firebase.auth();
                const initAuth = async () => {
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        await auth.signInWithCustomToken(__initial_auth_token);
                    } else {
                        await auth.signInAnonymously();
                    }
                };
                initAuth();
                return auth.onAuthStateChanged(setUser);
            }, []);

            useEffect(() => {
                if (!user || !firebaseConfig.apiKey) return;
                const db = firebase.firestore();
                const userDoc = db.collection('artifacts').doc(appId).collection('users').doc(user.uid);

                const unsubState = userDoc.onSnapshot((doc) => {
                    if (doc.exists) {
                        const data = doc.data();
                        if (data.routine) setRoutine(data.routine);
                        if (data.sessionData) setSessionData(data.sessionData);
                    }
                });

                const unsubHistory = userDoc.collection('history').onSnapshot((snapshot) => {
                    const logs = snapshot.docs.map(d => ({ ...d.data(), id: d.id }));
                    setHistory(logs.sort((a, b) => Number(b.id) - Number(a.id)));
                }, (error) => console.error("History fetch error:", error));

                return () => { unsubState(); unsubHistory(); };
            }, [user]);

            const syncToCloud = async (newData, type) => {
                if (!user || !firebaseConfig.apiKey) return;
                const db = firebase.firestore();
                const userDoc = db.collection('artifacts').doc(appId).collection('users').doc(user.uid);
                try {
                    if (type === 'routine') await userDoc.set({ routine: newData }, { merge: true });
                    if (type === 'session') await userDoc.set({ sessionData: newData }, { merge: true });
                } catch (e) { console.error("Cloud sync failed", e); }
            };

            const toggleTask = (id) => {
                const now = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                const updated = routine.map(t => {
                    if (t.id === id) {
                        const newStatus = !t.completed;
                        return { 
                            ...t, 
                            completed: newStatus,
                            completedAt: newStatus ? now : null,
                            subtasks: t.subtasks ? t.subtasks.map(s => ({ ...s, done: newStatus })) : undefined
                        };
                    }
                    return t;
                });
                setRoutine(updated);
                syncToCloud(updated, 'routine');
            };

            const toggleSubtask = (taskId, subIdx) => {
                const updated = routine.map(t => {
                    if (t.id === taskId) {
                        const newSubtasks = t.subtasks.map((s, idx) => idx === subIdx ? { ...s, done: !s.done } : s);
                        const allDone = newSubtasks.every(s => s.done);
                        return { ...t, subtasks: newSubtasks, completed: allDone };
                    }
                    return t;
                });
                setRoutine(updated);
                syncToCloud(updated, 'routine');
            };

            const updateSession = (key, val) => {
                const updated = { ...sessionData, [key]: val };
                setSessionData(updated);
                syncToCloud(updated, 'session');
            };

            const submitSession = async () => {
                if (!user || isSubmitting) return;
                setIsSubmitting(true);
                
                try {
                    const missed = routine.filter(t => !t.completed).map(t => ({ time: t.time, task: t.task }));
                    const recordId = Date.now().toString();
                    const newRecord = {
                        id: recordId,
                        date: new Date().toLocaleDateString(),
                        timestamp: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
                        stats: { ...sessionData },
                        missedTasks: missed
                    };
                    
                    const db = firebase.firestore();
                    const userDoc = db.collection('artifacts').doc(appId).collection('users').doc(user.uid);
                    
                    // 1. Save to History Collection FIRST
                    await userDoc.collection('history').doc(recordId).set(newRecord);
                    
                    // 2. Reset daily states
                    const resetStats = { ...sessionData, wins: 0, losses: 0, rrDiff: 0 };
                    await userDoc.set({ routine: INITIAL_ROUTINE, sessionData: resetStats }, { merge: true });
                    
                    setRoutine(INITIAL_ROUTINE);
                    setSessionData(resetStats);
                    setActiveTab('history');
                } catch (e) {
                    console.error("Submission failed:", e);
                } finally {
                    setIsSubmitting(false);
                }
            };

            const clearHistory = async () => {
                if(!confirm("Delete all historical logs?")) return;
                if (!user) return;
                const db = firebase.firestore();
                const histRef = db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('history');
                const snap = await histRef.get();
                const batch = db.batch();
                snap.docs.forEach(doc => batch.delete(doc.ref));
                await batch.commit();
            };

            const progressPercent = Math.round((routine.filter(t => t.completed).length / routine.length) * 100);

            return (
                <div className="min-h-screen p-4 md:p-8 bg-[#0a0b10]">
                    <div className="max-w-2xl mx-auto pb-40">
                        
                        <div className="flex justify-between items-start mb-8 pt-4">
                            <div>
                                <h1 className="text-4xl font-[900] text-red-600 tracking-tighter italic-force">VALO CLIMB</h1>
                                <p className="text-slate-500 text-[10px] font-black tracking-[0.3em] uppercase">Tactical Tracker</p>
                            </div>
                            <div className="flex gap-2 bg-slate-900 p-1 rounded-xl">
                                <button onClick={() => setActiveTab('daily')} className={`p-2 rounded-lg ${activeTab === 'daily' ? 'bg-red-600' : 'text-slate-500'}`}><LucideIcon name="check-square" /></button>
                                <button onClick={() => setActiveTab('history')} className={`p-2 rounded-lg ${activeTab === 'history' ? 'bg-red-600' : 'text-slate-500'}`}><LucideIcon name="history" /></button>
                            </div>
                        </div>

                        {activeTab === 'daily' ? (
                            <div className="space-y-6">
                                <div className="bg-slate-900 border border-slate-800 p-6 rounded-[2rem] shadow-2xl">
                                    <div className="flex justify-between items-end mb-4">
                                        <span className="text-xs font-bold text-slate-400">DAILY PROGRESS</span>
                                        <span className="text-3xl font-black text-red-600 italic-force">{progressPercent}%</span>
                                    </div>
                                    <div className="h-3 w-full bg-black rounded-full overflow-hidden">
                                        <div className="h-full bg-red-600 progress-glow" style={{ width: `${progressPercent}%` }} />
                                    </div>
                                </div>

                                {routine.map(item => (
                                    <div key={item.id} className={`p-5 rounded-[1.5rem] border transition-all ${item.completed ? 'bg-slate-950/50 border-slate-900' : 'bg-slate-900 border-slate-800'}`}>
                                        <div className="flex items-center">
                                            <button onClick={() => toggleTask(item.id)} className={`mr-4 ${item.completed ? 'text-emerald-500' : 'text-slate-700'}`}>
                                                {item.completed ? <LucideIcon name="check-circle" className="w-8 h-8" /> : <div className="w-8 h-8 border-2 border-current rounded-lg" />}
                                            </button>
                                            <div className="flex-1">
                                                <div className="flex justify-between">
                                                    <span className="text-[9px] font-black text-slate-500 uppercase">{item.time}</span>
                                                    {item.completedAt && <span className="text-[9px] text-emerald-500 font-bold uppercase">{item.completedAt}</span>}
                                                </div>
                                                <h3 className={`font-black text-lg ${item.completed ? 'text-slate-600 line-through' : 'text-white'}`}>{item.task}</h3>
                                            </div>
                                        </div>
                                        {!item.completed && item.subtasks && (
                                            <div className="mt-4 ml-12 space-y-2">
                                                {item.subtasks.map((sub, idx) => (
                                                    <div key={idx} onClick={() => toggleSubtask(item.id, idx)} className="flex items-center gap-2 cursor-pointer">
                                                        <div className={`w-4 h-4 rounded border ${sub.done ? 'bg-emerald-500 border-emerald-500' : 'border-slate-700'}`} />
                                                        <span className={`text-[11px] font-bold ${sub.done ? 'text-slate-600' : 'text-slate-400'}`}>{sub.label}</span>
                                                    </div>
                                                ))}
                                            </div>
                                        )}
                                    </div>
                                ))}

                                <div className="mt-12 bg-slate-900 border border-slate-800 rounded-[2rem] p-6">
                                    <h3 className="text-lg font-black italic-force uppercase mb-6">Session Stats</h3>
                                    <div className="grid grid-cols-2 gap-4 mb-6">
                                        <div className="space-y-1">
                                            <label className="text-[9px] font-black text-slate-500 uppercase">Rank</label>
                                            <select value={sessionData.rank} onChange={(e) => updateSession('rank', e.target.value)} className="w-full bg-slate-950 border border-slate-800 text-white rounded-xl px-3 py-2 text-xs font-bold outline-none">
                                                {['Unranked', 'Iron', 'Bronze', 'Silver', 'Gold', 'Platinum', 'Diamond', 'Ascendant', 'Immortal', 'Radiant'].map(r => <option key={r} value={r}>{r}</option>)}
                                            </select>
                                        </div>
                                        <div className="space-y-1">
                                            <label className="text-[9px] font-black text-slate-500 uppercase">Sleep</label>
                                            <select value={sessionData.sleep} onChange={(e) => updateSession('sleep', e.target.value)} className="w-full bg-slate-950 border border-slate-800 text-white rounded-xl px-3 py-2 text-xs font-bold outline-none">
                                                <option>Excellent</option><option>Good</option><option>Average</option><option>Poor</option>
                                            </select>
                                        </div>
                                    </div>
                                    <div className="flex justify-around items-center bg-black/30 p-4 rounded-2xl mb-6">
                                        <div className="text-center">
                                            <span className="text-[9px] font-black text-emerald-500 block uppercase">W</span>
                                            <input type="number" value={sessionData.wins} onChange={(e) => updateSession('wins', parseInt(e.target.value) || 0)} className="w-12 bg-transparent text-3xl font-black text-white outline-none italic-force" />
                                        </div>
                                        <div className="text-center">
                                            <span className="text-[9px] font-black text-red-500 block uppercase">L</span>
                                            <input type="number" value={sessionData.losses} onChange={(e) => updateSession('losses', parseInt(e.target.value) || 0)} className="w-12 bg-transparent text-3xl font-black text-white outline-none italic-force" />
                                        </div>
                                    </div>
                                    <button 
                                        disabled={isSubmitting}
                                        onClick={submitSession} 
                                        className={`w-full py-4 bg-red-600 text-white font-black rounded-xl tracking-widest uppercase transition-opacity ${isSubmitting ? 'opacity-50' : 'hover:bg-red-500'}`}
                                    >
                                        {isSubmitting ? 'SAVING...' : 'ARCHIVE SESSION'}
                                    </button>
                                </div>
                            </div>
                        ) : (
                            <div className="space-y-4">
                                <div className="flex justify-between items-center mb-4">
                                    <h2 className="text-xl font-black italic-force uppercase">History</h2>
                                    <button onClick={clearHistory} className="text-[10px] font-black text-red-500 uppercase">Clear All</button>
                                </div>
                                {history.length === 0 ? (
                                    <div className="text-center py-20 text-slate-600 font-bold uppercase text-xs tracking-widest">No entries yet</div>
                                ) : (
                                    history.map(record => (
                                        <div key={record.id} className="bg-slate-900 border border-slate-800 rounded-2xl p-5">
                                            <div className="flex justify-between items-center mb-3">
                                                <span className="text-xs font-black text-slate-500">{record.date}</span>
                                                <span className="text-xs font-black text-emerald-500 uppercase italic-force">{record.stats.wins}W - {record.stats.losses}L</span>
                                            </div>
                                            <div className="grid grid-cols-2 text-[10px] gap-2">
                                                <div className="bg-black/40 p-2 rounded-lg"><span className="text-slate-500 block">RANK</span><span className="font-bold">{record.stats.rank}</span></div>
                                                <div className="bg-black/40 p-2 rounded-lg"><span className="text-slate-500 block">SLEEP</span><span className="font-bold">{record.stats.sleep}</span></div>
                                            </div>
                                            {record.missedTasks.length > 0 && (
                                                <div className="mt-3 pt-3 border-t border-slate-800">
                                                    <span className="text-[9px] font-black text-red-600 uppercase block mb-1">Missed</span>
                                                    <div className="flex flex-wrap gap-1">
                                                        {record.missedTasks.map((t, i) => <span key={i} className="text-[9px] bg-red-900/20 text-red-400 px-1.5 py-0.5 rounded uppercase font-bold">{t.task}</span>)}
                                                    </div>
                                                </div>
                                            )}
                                        </div>
                                    ))
                                )}
                            </div>
                        )}
                        
                        <div className="fixed bottom-8 left-1/2 -translate-x-1/2 w-[calc(100%-3rem)] max-w-sm">
                             <div className="bg-slate-900/80 backdrop-blur-lg border border-white/5 p-2 rounded-2xl flex justify-around">
                                <button onClick={() => setActiveTab('daily')} className={`flex-1 py-3 flex flex-col items-center gap-1 ${activeTab === 'daily' ? 'text-white' : 'text-slate-500'}`}>
                                    <LucideIcon name="list" className="w-5 h-5" /><span className="text-[8px] font-black uppercase">Daily</span>
                                </button>
                                <button onClick={() => setActiveTab('history')} className={`flex-1 py-3 flex flex-col items-center gap-1 ${activeTab === 'history' ? 'text-white' : 'text-slate-500'}`}>
                                    <LucideIcon name="history" className="w-5 h-5" /><span className="text-[8px] font-black uppercase">History</span>
                                </button>
                             </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
