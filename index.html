<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VALO CLIMB | Tactical Tracker</title>
    
    <!-- PWA Metadata for iOS -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="ValoClimb">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & Libraries -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Firebase SDKs (Compat Version) -->
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore-compat.js"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0a0b10; -webkit-tap-highlight-color: transparent; color: #f1f5f9; overflow-x: hidden; }
        .italic-force { font-style: italic; }
        .progress-glow { box-shadow: 0 0 20px rgba(220, 38, 38, 0.4); }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .task-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const APP_VERSION = "1.3.1-stable";
        const INITIAL_ROUTINE = [
            { id: 1, time: '10:30 AM', task: 'Wake Up', completed: false, purpose: 'Reset circadian rhythm.' },
            { id: 2, time: '10:45 AM', task: 'Morning Activation', completed: false, purpose: 'Reaction readiness.' },
            { id: 3, time: '11:00 AM', task: 'Breakfast', completed: false, purpose: 'Avoid heavy carbs.' },
            { id: 5, time: '12:30 PM', task: 'Mechanical Training', completed: false, purpose: 'Warm brain + hand coordination.' },
            { id: 6, time: '1:30 PM', task: 'Ranked Block 1', completed: false, purpose: '3 matches max.' },
            { id: 7, time: '3:30 PM', task: 'Hard Reset Break', completed: false, purpose: 'Critical for winrate.' },
            { id: 8, time: '4:30 PM', task: 'Ranked Block 2', completed: false, purpose: 'Focus on Positioning.' },
            { id: 9, time: '6:00 PM', task: 'Running / Cardio', completed: false, purpose: 'Stamina + Stress reduction.' },
            { id: 11, time: '8:30 PM', task: 'Ranked Block 3', completed: false, purpose: '1–2 matches max.' },
            { id: 15, time: '12:30 AM', task: 'Sleep Attempt', completed: false, purpose: 'Rest for tomorrow.' }
        ];

        // App Component
        const App = () => {
            const [user, setUser] = useState(null);
            const [activeTab, setActiveTab] = useState('daily');
            const [routine, setRoutine] = useState(INITIAL_ROUTINE);
            const [history, setHistory] = useState([]);
            const [sessionData, setSessionData] = useState({ wins: 0, losses: 0 });
            const [loading, setLoading] = useState(true);

            // App Constants
            const appId = typeof __app_id !== 'undefined' ? __app_id : 'valo-climb-default';

            // Lucide Icon Helper
            const LucideIcon = ({ name, className = "w-5 h-5" }) => {
                const containerRef = useRef(null);
                useEffect(() => {
                    if (containerRef.current && window.lucide) {
                        containerRef.current.innerHTML = `<i data-lucide="${name}" class="${className}"></i>`;
                        window.lucide.createIcons({ attrs: { class: className }, nameAttr: 'data-lucide' });
                    }
                }, [name, className]);
                return <span ref={containerRef} className="inline-block" />;
            };

            // 1. Initialize Firebase Auth
            useEffect(() => {
                const startAuth = async () => {
                    try {
                        const firebaseConfig = JSON.parse(__firebase_config);
                        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
                        
                        const auth = firebase.auth();
                        
                        // Rule 3: Auth Before Queries
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await auth.signInWithCustomToken(__initial_auth_token);
                        } else {
                            await auth.signInAnonymously();
                        }

                        const unsubscribe = auth.onAuthStateChanged(u => {
                            setUser(u);
                            setLoading(false);
                        });
                        return unsubscribe;
                    } catch (e) {
                        console.error("Firebase init failed", e);
                        setLoading(false);
                    }
                };
                startAuth();
            }, []);

            // 2. Real-time Cloud Sync (Cross-device Saving)
            useEffect(() => {
                if (!user) return;
                const db = firebase.firestore();

                // Rule 1: Strict Paths
                const routineRef = db.doc(`artifacts/${appId}/users/${user.uid}/state/routine`);
                const sessionRef = db.doc(`artifacts/${appId}/users/${user.uid}/state/session`);
                const historyCol = db.collection(`artifacts/${appId}/users/${user.uid}/history`);

                const unsubRoutine = routineRef.onSnapshot(doc => {
                    if (doc.exists) setRoutine(doc.data().tasks);
                    else routineRef.set({ tasks: INITIAL_ROUTINE });
                });

                const unsubSession = sessionRef.onSnapshot(doc => {
                    if (doc.exists) setSessionData(doc.data());
                });

                const unsubHistory = historyCol.onSnapshot(snap => {
                    const logs = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                    setHistory(logs.sort((a, b) => (b.timestamp_ms || 0) - (a.timestamp_ms || 0)));
                });

                return () => { unsubRoutine(); unsubSession(); unsubHistory(); };
            }, [user]);

            const updateCloudRoutine = (newTasks) => {
                if (!user) return;
                const db = firebase.firestore();
                db.doc(`artifacts/${appId}/users/${user.uid}/state/routine`).set({ tasks: newTasks });
            };

            const toggleTask = (id) => {
                const newTasks = routine.map(t => t.id === id ? { ...t, completed: !t.completed } : t);
                setRoutine(newTasks); // Update UI immediately
                updateCloudRoutine(newTasks); // Sync to Cloud
            };

            const updateStats = (key, val) => {
                const newData = { ...sessionData, [key]: Math.max(0, val) };
                setSessionData(newData);
                if (user) {
                    firebase.firestore().doc(`artifacts/${appId}/users/${user.uid}/state/session`).set(newData);
                }
            };

            const submitSession = async () => {
                if (!user) return;
                const db = firebase.firestore();
                const record = {
                    date: new Date().toLocaleDateString(),
                    timestamp_ms: Date.now(),
                    stats: sessionData,
                    missedTasks: routine.filter(t => !t.completed).map(t => t.task)
                };
                
                await db.collection(`artifacts/${appId}/users/${user.uid}/history`).add(record);
                await db.doc(`artifacts/${appId}/users/${user.uid}/state/routine`).set({ tasks: INITIAL_ROUTINE });
                updateStats('wins', 0);
                updateStats('losses', 0);
                setActiveTab('history');
            };

            const progress = Math.round((routine.filter(t => t.completed).length / routine.length) * 100);

            if (loading) return (
                <div className="min-h-screen flex items-center justify-center bg-[#0a0b10] text-red-600 font-black uppercase tracking-widest">
                    Synchronizing Tactical Data...
                </div>
            );

            return (
                <div className="min-h-screen p-4 md:p-8 bg-[#0a0b10]">
                    <div className="max-w-3xl mx-auto pb-40">
                        {/* Header */}
                        <div className="flex justify-between items-start mb-8 pt-4">
                            <div>
                                <h1 className="text-4xl font-[900] text-red-600 tracking-tighter italic-force leading-none uppercase">VALO CLIMB</h1>
                                <div className="mt-1 flex flex-col">
                                    <p className="text-slate-500 text-[9px] font-black tracking-[0.3em] uppercase">Tactical Performance Cloud</p>
                                    <span className="text-slate-600 text-[8px] font-bold uppercase tracking-tighter">v{APP_VERSION}</span>
                                </div>
                            </div>
                            <div className="flex gap-2 bg-slate-900/50 p-1.5 rounded-2xl border border-slate-800">
                                <button onClick={() => setActiveTab('daily')} className={`p-3 rounded-xl transition-all ${activeTab === 'daily' ? 'bg-red-600 text-white' : 'text-slate-500'}`}>
                                    <LucideIcon name="check-square" />
                                </button>
                                <button onClick={() => setActiveTab('history')} className={`p-3 rounded-xl transition-all ${activeTab === 'history' ? 'bg-red-600 text-white' : 'text-slate-500'}`}>
                                    <LucideIcon name="history" />
                                </button>
                            </div>
                        </div>

                        {activeTab === 'daily' ? (
                            <div className="space-y-6 animate-in slide-in-from-bottom-4 duration-500">
                                <div className="bg-gradient-to-br from-slate-900 to-slate-950 border border-slate-800 p-7 rounded-[2.5rem] shadow-2xl relative overflow-hidden">
                                    <div className="flex justify-between items-end mb-4">
                                        <div className="space-y-1">
                                            <span className="text-[10px] font-black text-slate-500 uppercase tracking-widest">Discipline Gauge</span>
                                            <div className="text-sm font-bold text-slate-300">Objective Progress</div>
                                        </div>
                                        <span className="text-4xl font-black text-red-600 italic-force leading-none">{progress}%</span>
                                    </div>
                                    <div className="h-4 w-full bg-black/40 rounded-full overflow-hidden p-1 border border-white/5">
                                        <div className="h-full bg-red-600 rounded-full transition-all duration-700 progress-glow" style={{ width: `${progress}%` }} />
                                    </div>
                                </div>

                                <div className="space-y-3">
                                    {routine.map(t => (
                                        <div key={t.id} onClick={() => toggleTask(t.id)} className={`task-card flex items-center p-5 rounded-[1.8rem] border cursor-pointer transition-all ${t.completed ? 'bg-slate-950/40 border-slate-900 opacity-40' : 'bg-slate-900 border-slate-800 shadow-lg'}`}>
                                            <div className={`mr-4 ${t.completed ? 'text-emerald-500' : 'text-slate-700'}`}>
                                                {t.completed ? <LucideIcon name="check-circle" className="w-8 h-8" /> : <div className="w-8 h-8 border-2 border-current rounded-xl rotate-45" />}
                                            </div>
                                            <div>
                                                <span className="text-[8px] font-black text-slate-500 uppercase tracking-widest">{t.time}</span>
                                                <h3 className={`font-black text-lg uppercase tracking-tight ${t.completed ? 'line-through text-slate-600' : 'text-white'}`}>{t.task}</h3>
                                            </div>
                                        </div>
                                    ))}
                                </div>

                                <div className="mt-10 bg-slate-900 border-2 border-slate-800 rounded-[2.5rem] p-8">
                                    <h3 className="text-lg font-black uppercase italic-force mb-6">Today's Session</h3>
                                    <div className="grid grid-cols-2 gap-8 mb-8">
                                        <div className="text-center">
                                            <label className="text-[10px] font-black text-emerald-500 uppercase block mb-1">Wins</label>
                                            <div className="flex items-center justify-center gap-4">
                                                <button onClick={(e) => { e.stopPropagation(); updateStats('wins', sessionData.wins - 1)}} className="w-8 h-8 bg-slate-800 rounded-lg text-slate-400 font-bold">-</button>
                                                <span className="font-black text-4xl text-emerald-400 italic-force">{sessionData.wins}</span>
                                                <button onClick={(e) => { e.stopPropagation(); updateStats('wins', sessionData.wins + 1)}} className="w-8 h-8 bg-slate-800 rounded-lg text-slate-400 font-bold">+</button>
                                            </div>
                                        </div>
                                        <div className="text-center">
                                            <label className="text-[10px] font-black text-red-500 uppercase block mb-1">Losses</label>
                                            <div className="flex items-center justify-center gap-4">
                                                <button onClick={(e) => { e.stopPropagation(); updateStats('losses', sessionData.losses - 1)}} className="w-8 h-8 bg-slate-800 rounded-lg text-slate-400 font-bold">-</button>
                                                <span className="font-black text-4xl text-red-400 italic-force">{sessionData.losses}</span>
                                                <button onClick={(e) => { e.stopPropagation(); updateStats('losses', sessionData.losses + 1)}} className="w-8 h-8 bg-slate-800 rounded-lg text-slate-400 font-bold">+</button>
                                            </div>
                                        </div>
                                    </div>
                                    <button onClick={submitSession} className="w-full py-4 bg-red-600 hover:bg-red-500 text-white font-[900] uppercase italic-force tracking-widest rounded-2xl transition-all active:scale-[0.98]">
                                        SUBMIT CLOUD LOG
                                    </button>
                                </div>
                            </div>
                        ) : (
                            <div className="space-y-4 animate-in fade-in duration-500">
                                <h2 className="text-xl font-black text-white italic-force uppercase px-2">Archive</h2>
                                {history.length === 0 ? (
                                    <div className="py-20 text-center text-slate-700 uppercase font-black tracking-widest text-[10px]">No logs synchronized</div>
                                ) : (
                                    history.map(record => (
                                        <div key={record.id} className="bg-slate-900 border border-slate-800 rounded-[2rem] p-6">
                                            <div className="flex justify-between items-center">
                                                <span className="text-xs font-black text-white italic-force">{record.date}</span>
                                                <span className={`text-[10px] font-black uppercase px-2 py-0.5 rounded ${record.stats.wins >= record.stats.losses ? 'bg-emerald-950/40 text-emerald-400' : 'bg-red-950/40 text-red-400'}`}>
                                                    {record.stats.wins}W - {record.stats.losses}L
                                                </span>
                                            </div>
                                            {record.missedTasks?.length > 0 && (
                                                <div className="mt-3 flex flex-wrap gap-1">
                                                    {record.missedTasks.map((m, i) => (
                                                        <span key={i} className="text-[8px] font-bold text-slate-500 bg-black/30 px-2 py-0.5 rounded uppercase">{m}</span>
                                                    ))}
                                                </div>
                                            )}
                                        </div>
                                    ))
                                )}
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
