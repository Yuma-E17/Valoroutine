<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VALOROUTINE | Tactical Tracker</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Valoroutine">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #06070a; 
            -webkit-tap-highlight-color: transparent; 
            color: #f1f5f9; 
            overflow-x: hidden; 
        }

        .italic-force { font-style: italic; }
        .progress-glow { box-shadow: 0 0 15px rgba(220, 38, 38, 0.3); }
        .card-shadow { box-shadow: 0 4px 20px -5px rgba(0,0,0,0.5); }
        
        .tab-btn { transition: all 0.2s ease; }
        .active-tab { color: #ef4444; background: rgba(239, 68, 68, 0.08); }
        
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }

        select {
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='white' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 0.75rem center;
            background-size: 0.8em;
        }

        .scrollbar-hide::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        
        const RANKS = [
            "Unrated", "Iron 1", "Iron 2", "Iron 3", "Bronze 1", "Bronze 2", "Bronze 3", 
            "Silver 1", "Silver 2", "Silver 3", "Gold 1", "Gold 2", "Gold 3", 
            "Platinum 1", "Platinum 2", "Platinum 3", "Diamond 1", "Diamond 2", "Diamond 3", 
            "Ascendant 1", "Ascendant 2", "Ascendant 3", "Immortal 1", "Immortal 2", "Immortal 3", "Radiant"
        ];

        // Shared subtasks for all activation sessions
        const ACTIVATION_SUBTASKS = [
            { label: '15 pushups', done: false }, 
            { label: '20 squats', done: false }, 
            { label: '30s Plank', done: false }, 
            { label: 'Wrist mobility', done: false }
        ];

        const INITIAL_ROUTINE = [
            { id: 1, time: '10:30 AM', duration: '15m', task: 'Wake Up', completed: true, purpose: 'Reset circadian rhythm.', subtasks: [{ label: 'Drink water', done: true }, { label: 'Sunlight Exposure', done: true }, { label: 'Brush teeth', done: true }] },
            { id: 2, time: '10:45 AM', duration: '15m', task: 'Morning Activation', completed: true, purpose: 'Improves mouse control.', subtasks: ACTIVATION_SUBTASKS.map(s => ({...s, done: true})) },
            { id: 3, time: '11:00 AM', duration: '30m', task: 'Breakfast', completed: true, purpose: 'Avoid heavy carbs.', subtasks: [{ label: 'High Protein Meal', done: true }, { label: 'Hydrate', done: true }] },
            { id: 4, time: '11:30 AM', duration: '1h', task: 'Life Tasks', completed: true, purpose: 'Productivity window.' },
            { id: 5, time: '12:30 PM', duration: '45m', task: 'Mechanical Training', completed: false, purpose: 'Warm brain + coordination.', subtasks: [{ label: 'Flick training', done: false }, { label: 'Tracking training', done: false }] },
            { id: 6, time: '1:30 PM', duration: '2h', task: 'Ranked Block 1', completed: false, purpose: 'Peak performance window.' },
            { id: 7, time: '3:30 PM', duration: '30m', task: 'Midday Activation', completed: false, purpose: 'Blood flow for focus.', subtasks: JSON.parse(JSON.stringify(ACTIVATION_SUBTASKS)) },
            { id: 8, time: '4:00 PM', duration: '1h', task: 'Hard Reset Break', completed: false, purpose: 'Avoid mental fatigue.' },
            { id: 9, time: '5:00 PM', duration: '1.5h', task: 'Ranked Block 2', completed: false, purpose: 'Positioning focus.' },
            { id: 10, time: '6:30 PM', duration: '1h', task: 'Cardio', completed: true, purpose: 'Stress reduction.' },
            { id: 11, time: '8:30 PM', duration: '1.5h', task: 'Ranked Block 3', completed: false, purpose: 'Night session.' },
            { id: 12, time: '10:00 PM', duration: '30m', task: 'Night Activation', completed: false, purpose: 'Evening core stability.', subtasks: JSON.parse(JSON.stringify(ACTIVATION_SUBTASKS)) },
            { id: 13, time: '11:30 PM', duration: '1h', task: 'Winding Down', completed: false, purpose: 'Blue light reduction.' },
            { id: 15, time: '12:30 AM', duration: 'N/A', task: 'Sleep Attempt', completed: false, purpose: 'Recovery.' }
        ];

        const LucideIcon = ({ name, className = "w-4 h-4" }) => {
            const containerRef = useRef(null);
            useEffect(() => {
                if (containerRef.current && window.lucide) {
                    containerRef.current.innerHTML = `<i data-lucide="${name}" class="${className}"></i>`;
                    window.lucide.createIcons({ attrs: { class: className }, nameAttr: 'data-lucide' });
                }
            }, [name, className]);
            return <span ref={containerRef} className="inline-block" />;
        };

        const MouseIcon = ({ className }) => (
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <rect x="5" y="2" width="14" height="20" rx="7" />
                <path d="M12 2v7" />
            </svg>
        );

        const App = () => {
            const [activeTab, setActiveTab] = useState('daily');
            
            const [routine, setRoutine] = useState(() => {
                const saved = localStorage.getItem('valoroutine_v6_data');
                return saved ? JSON.parse(saved) : INITIAL_ROUTINE;
            });

            const [gear, setGear] = useState(() => {
                const saved = localStorage.getItem('valoroutine_gear_v6');
                return saved ? JSON.parse(saved) : { 
                    mouse: 'Logitech G Pro', 
                    sens: '0.3', 
                    dpi: '800', 
                    pad: 'Artisan Zero', 
                    hz: '240Hz',
                    res: '1920x1080',
                    polling: '1000Hz',
                    winSens: '6/11'
                };
            });

            const [stats, setStats] = useState(() => {
                const saved = localStorage.getItem('valoroutine_stats_v6');
                return saved ? JSON.parse(saved) : { rank: 'Silver 2', currentRR: 45, wins: 1, losses: 0, rrDelta: 23 };
            });

            const [history, setHistory] = useState(() => {
                const saved = localStorage.getItem('valoroutine_history_v6');
                return saved ? JSON.parse(saved) : [];
            });

            useEffect(() => {
                localStorage.setItem('valoroutine_v6_data', JSON.stringify(routine));
                localStorage.setItem('valoroutine_gear_v6', JSON.stringify(gear));
                localStorage.setItem('valoroutine_stats_v6', JSON.stringify(stats));
                localStorage.setItem('valoroutine_history_v6', JSON.stringify(history));
            }, [routine, gear, stats, history]);

            const toggleTask = (id) => {
                setRoutine(prev => prev.map(t => {
                    if (t.id === id) {
                        const nextState = !t.completed;
                        return { ...t, completed: nextState, subtasks: t.subtasks ? t.subtasks.map(s => ({ ...s, done: nextState })) : undefined };
                    }
                    return t;
                }));
            };

            const toggleSubtask = (taskId, subIdx) => {
                setRoutine(prev => prev.map(t => {
                    if (t.id === taskId) {
                        const newSubtasks = t.subtasks.map((s, idx) => idx === subIdx ? { ...s, done: !s.done } : s);
                        return { ...t, subtasks: newSubtasks, completed: newSubtasks.every(s => s.done) };
                    }
                    return t;
                }));
            };

            const updateStat = (key, val) => setStats(prev => ({ ...prev, [key]: val }));

            const submitSession = () => {
                const newLog = {
                    date: new Date().toLocaleDateString(),
                    ...stats,
                    completion: progress
                };
                setHistory([newLog, ...history]);
                setActiveTab('history');
            };

            const progress = Math.round((routine.filter(t => t.completed).length / routine.length) * 100);

            return (
                <div className="min-h-screen p-3 md:p-6 flex justify-center pb-8">
                    <div className="w-full max-w-md">
                        {/* Header */}
                        <header className="mb-4 flex justify-between items-end px-1">
                            <div>
                                <h1 className="text-2xl font-[900] text-red-600 italic-force tracking-tighter uppercase leading-none">VALOROUTINE</h1>
                                <p className="text-[8px] font-black text-slate-600 uppercase tracking-widest mt-1">Optimization System <span className="text-red-500/50 ml-1">V6.0</span></p>
                            </div>
                            <div className="text-right">
                                <div className="text-lg font-black text-white italic-force">{progress}%</div>
                            </div>
                        </header>

                        {/* Navigation */}
                        <div className="flex bg-slate-900/50 border border-slate-800/50 rounded-xl p-0.5 mb-4">
                            {[
                                { id: 'daily', icon: 'crosshair', label: 'Active' },
                                { id: 'history', icon: 'history', label: 'History' },
                                { id: 'gear', icon: 'mouse', label: 'Gear' }
                            ].map(tab => (
                                <button 
                                    key={tab.id}
                                    onClick={() => setActiveTab(tab.id)} 
                                    className={`flex-1 py-1.5 rounded-lg flex items-center justify-center gap-1.5 transition-all tab-btn ${activeTab === tab.id ? 'active-tab' : 'text-slate-500'}`}
                                >
                                    {tab.icon === 'mouse' ? <MouseIcon className="w-3.5 h-3.5" /> : <LucideIcon name={tab.icon} className="w-3.5 h-3.5" />}
                                    <span className="text-[9px] font-black uppercase tracking-wider">{tab.label}</span>
                                </button>
                            ))}
                        </div>

                        {/* Progress Bar */}
                        <div className="bg-slate-900/40 border border-slate-800/50 p-0.5 rounded-full mb-4">
                            <div className="h-0.5 w-full bg-black/40 rounded-full overflow-hidden">
                                <div className="h-full bg-red-600 progress-glow transition-all duration-700" style={{ width: `${progress}%` }} />
                            </div>
                        </div>

                        {activeTab === 'daily' && (
                            <div className="space-y-2">
                                {routine.map(item => (
                                    <div key={item.id} className={`p-3 rounded-xl border transition-all card-shadow ${item.completed ? 'bg-slate-950/40 border-slate-900 opacity-60' : 'bg-slate-900 border-slate-800'}`}>
                                        <div className="flex items-start gap-2.5">
                                            <button onClick={() => toggleTask(item.id)} className={`mt-0.5 flex-shrink-0 ${item.completed ? 'text-emerald-500' : 'text-slate-700'}`}>
                                                <LucideIcon name={item.completed ? "check-circle" : "circle"} className="w-5 h-5" />
                                            </button>
                                            <div className="flex-1">
                                                <div className="flex items-center gap-2 mb-0.5">
                                                    <span className="text-[8px] font-black text-slate-500 uppercase tracking-tighter">{item.time}</span>
                                                    <span className="text-[8px] text-slate-400 font-bold uppercase">{item.duration}</span>
                                                </div>
                                                <h3 className={`font-black text-sm uppercase tracking-tight leading-none ${item.completed ? 'text-slate-600 line-through' : 'text-white'}`}>{item.task}</h3>
                                            </div>
                                        </div>
                                        {!item.completed && item.subtasks && (
                                            <div className="mt-2 grid grid-cols-1 gap-1">
                                                {item.subtasks.map((sub, idx) => (
                                                    <button key={idx} onClick={() => toggleSubtask(item.id, idx)} className={`w-full py-2 px-3 rounded-lg text-left flex items-center justify-between transition-all ${sub.done ? 'bg-emerald-500/10 border border-emerald-500/20' : 'bg-black/30 border border-white/5'}`}>
                                                        <span className={`text-[10px] font-bold uppercase tracking-wide ${sub.done ? 'text-emerald-400' : 'text-slate-400'}`}>{sub.label}</span>
                                                        {sub.done && <LucideIcon name="check" className="w-3 h-3 text-emerald-400" />}
                                                    </button>
                                                ))}
                                            </div>
                                        )}
                                    </div>
                                ))}

                                {/* Post-Session Block */}
                                <div className="bg-red-600/5 border border-red-600/10 p-4 rounded-2xl mt-4">
                                    <h2 className="text-xs font-black italic-force uppercase text-red-500 mb-3 flex items-center gap-2">
                                        <LucideIcon name="bar-chart" className="w-3.5 h-3.5"/> Session Analysis
                                    </h2>
                                    <div className="space-y-3">
                                        <div className="grid grid-cols-2 gap-2">
                                            <div className="space-y-1">
                                                <label className="text-[7px] font-black text-slate-500 uppercase tracking-widest ml-1">Rank</label>
                                                <select value={stats.rank} onChange={(e) => updateStat('rank', e.target.value)} className="w-full bg-slate-950 border border-slate-800 px-2 py-1.5 rounded-lg text-[10px] font-bold text-white outline-none">
                                                    {RANKS.map(r => <option key={r} value={r}>{r}</option>)}
                                                </select>
                                            </div>
                                            <div className="space-y-1">
                                                <label className="text-[7px] font-black text-slate-500 uppercase tracking-widest ml-1">RR</label>
                                                <input type="number" value={stats.currentRR} onChange={(e) => updateStat('currentRR', parseInt(e.target.value) || 0)} className="w-full bg-slate-950 border border-slate-800 px-2 py-1.5 rounded-lg text-[10px] font-bold text-white outline-none" />
                                            </div>
                                        </div>
                                        <div className="grid grid-cols-3 gap-2">
                                            {[
                                                { key: 'wins', label: 'Wins' },
                                                { key: 'losses', label: 'Losses' },
                                                { key: 'rrDelta', label: 'RR Δ' }
                                            ].map(item => (
                                                <div key={item.key} className="bg-slate-950 px-2 py-1.5 rounded-lg border border-slate-800 text-center">
                                                    <span className="text-[7px] font-black text-slate-500 uppercase block mb-0.5">{item.label}</span>
                                                    <input type="number" value={stats[item.key]} onChange={(e) => updateStat(item.key, parseInt(e.target.value) || 0)} className="bg-transparent text-[10px] font-black text-white w-full text-center outline-none" />
                                                </div>
                                            ))}
                                        </div>
                                        <button 
                                            onClick={submitSession}
                                            className="w-full bg-red-600 hover:bg-red-700 text-white py-3 rounded-xl flex items-center justify-center gap-2 transition-all mt-2 active:scale-[0.98]"
                                        >
                                            <LucideIcon name="upload-cloud" className="w-4 h-4" />
                                            <span className="text-[10px] font-black uppercase tracking-widest">Submit Session Log</span>
                                        </button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'gear' && (
                            <div className="space-y-3 animate-in fade-in slide-in-from-bottom-1 duration-200">
                                <div className="bg-slate-900 border border-slate-800 px-4 py-3 rounded-2xl">
                                    <h2 className="text-xs font-black italic-force uppercase text-white mb-4 flex items-center gap-2">
                                        <MouseIcon className="w-3.5 h-3.5" /> Hardware
                                    </h2>
                                    <div className="space-y-2">
                                        {[
                                            { label: 'Mouse', key: 'mouse' },
                                            { label: 'Sensitivity', key: 'sens' },
                                            { label: 'DPI', key: 'dpi' },
                                            { label: 'Polling', key: 'polling' },
                                            { label: 'Resolution', key: 'res' },
                                            { label: 'Hz', key: 'hz' }
                                        ].map(item => (
                                            <div key={item.key} className="flex items-center justify-between border-b border-slate-800/20 pb-1.5">
                                                <span className="text-[8px] font-black text-slate-500 uppercase tracking-widest">{item.label}</span>
                                                <input value={gear[item.key]} onChange={(e) => setGear(prev => ({ ...prev, [item.key]: e.target.value }))} className="bg-transparent text-right font-bold text-white outline-none text-[10px] w-1/2" />
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'history' && (
                            <div className="space-y-3">
                                {history.length === 0 ? (
                                    <div className="flex flex-col items-center justify-center py-12 text-slate-800">
                                        <LucideIcon name="history" className="w-8 h-8 mb-2 opacity-10" />
                                        <p className="text-[8px] font-black uppercase tracking-[0.2em] opacity-30">No Logs Found</p>
                                    </div>
                                ) : (
                                    history.map((entry, idx) => (
                                        <div key={idx} className="bg-slate-900 border border-slate-800 p-3 rounded-xl">
                                            <div className="flex justify-between items-center mb-2">
                                                <span className="text-[10px] font-black text-white">{entry.date}</span>
                                                <span className="text-[8px] font-black text-red-500 uppercase">{entry.completion}% Success</span>
                                            </div>
                                            <div className="grid grid-cols-4 gap-2">
                                                <div className="text-center">
                                                    <div className="text-[7px] text-slate-500 uppercase font-black">Rank</div>
                                                    <div className="text-[10px] text-white font-bold">{entry.rank}</div>
                                                </div>
                                                <div className="text-center">
                                                    <div className="text-[7px] text-slate-500 uppercase font-black">W/L</div>
                                                    <div className="text-[10px] text-white font-bold">{entry.wins}/{entry.losses}</div>
                                                </div>
                                                <div className="text-center">
                                                    <div className="text-[7px] text-slate-500 uppercase font-black">RR</div>
                                                    <div className="text-[10px] text-white font-bold">{entry.currentRR}</div>
                                                </div>
                                                <div className="text-center">
                                                    <div className="text-[7px] text-slate-500 uppercase font-black">Δ</div>
                                                    <div className={`text-[10px] font-bold ${entry.rrDelta >= 0 ? 'text-emerald-500' : 'text-red-500'}`}>
                                                        {entry.rrDelta > 0 ? `+${entry.rrDelta}` : entry.rrDelta}
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    ))
                                )}
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
